<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Jacob Coming Soon!</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: gray; /* Solid gray background */
            color: white;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 48px;
            margin: 0; /* Remove margin */
        }
        h2 {
            font-size: 24px;
            margin: 0; /* Remove margin */
        }
        #canvas {
            width: 600px; /* Canvas width */
            height: 600px; /* Canvas height */
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Call of Jacob Coming Soon!</h1>
    <h2>The 3D Shooter Game</h2>
    <div id="canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Set up scene, camera, and renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 600 / 600, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(600, 600); // Set canvas size
        document.getElementById('canvas').appendChild(renderer.domElement);

        // Create a cube
        const geometry = new THREE.BoxGeometry(2, 2, 2); // Cube dimensions
        const material = new THREE.MeshBasicMaterial({ color: 0xADD8E6 }); // Solid color
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // Position the camera
        camera.position.z = 5;

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        animate();

        // Interaction for spinning the cube with mouse
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        const mouseDownHandler = (event) => {
            isDragging = true;
        };

        const mouseMoveHandler = (event) => {
            if (isDragging) {
                const deltaMove = {
                    x: event.offsetX - previousMousePosition.x,
                    y: event.offsetY - previousMousePosition.y
                };

                cube.rotation.y += deltaMove.x * 0.01;
                cube.rotation.x += deltaMove.y * 0.01;
            }
            previousMousePosition = { x: event.offsetX, y: event.offsetY };
        };

        const mouseUpHandler = () => {
            isDragging = false;
        };

        // Event listeners for mouse interactions
        renderer.domElement.addEventListener('mousedown', mouseDownHandler);
        renderer.domElement.addEventListener('mousemove', mouseMoveHandler);
        renderer.domElement.addEventListener('mouseup', mouseUpHandler);
    </script>
</body>
</html>
